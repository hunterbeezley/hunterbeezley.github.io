<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance - Hunter Beezley</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
    }

    /* Animated starfield background */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* Content container */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px;
      max-width: 600px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .subtitle {
      font-size: 24px;
      margin-bottom: 30px;
      color: #ccc;
    }

    .message {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .links {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      color: #fff;
      text-decoration: none;
      padding: 10px 20px;
      border: 2px solid #fff;
      border-radius: 5px;
      transition: all 0.3s ease;
      display: inline-block;
    }

    .links a:hover {
      background-color: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    /* Responsive design */
    @media (max-width: 768px) {
      h1 {
        font-size: 36px;
      }

      .subtitle {
        font-size: 20px;
      }

      .message {
        font-size: 16px;
      }
    }

    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <!-- Starfield background -->
  <div class="stars" id="stars"></div>

  <!-- Main content -->
  <div class="container">
    <h1>🛠️ Under Maintenance</h1>
    <div class="subtitle">Making things better</div>
    <div class="message">
      <p>I'm currently updating the site with some exciting improvements.</p>
      <p>Check back soon or connect with me on social media!</p>
    </div>
    <div class="links">
      <a href="https://github.com/hunterbeezley" target="_blank">GitHub</a>
      <a href="https://www.linkedin.com/in/hunterbeezley/" target="_blank">LinkedIn</a>
      <a href="https://www.instagram.com/h__nt3r_/" target="_blank">Instagram</a>
      <a href="https://www.tiktok.com/@h_nt3r_" target="_blank">TikTok</a>
    </div>
  </div>

  <script>
    // Create animated starfield
    const starsContainer = document.getElementById('stars');
    const starCount = 100;

    for (let i = 0; i < starCount; i++) {
      const star = document.createElement('div');
      star.className = 'star';

      // Random size between 1-3px
      const size = Math.random() * 2 + 1;
      star.style.width = size + 'px';
      star.style.height = size + 'px';

      // Random position
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';

      // Random animation delay
      star.style.animationDelay = Math.random() * 3 + 's';

      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
